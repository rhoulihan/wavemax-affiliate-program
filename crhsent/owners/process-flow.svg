<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" font-family="'Segoe UI',-apple-system,Roboto,Arial,sans-serif" role="img" aria-label="Four-scan order lifecycle: pickup at the partner creates the order (pending); intake at the store moves it to in progress; ready at the store with payment confirmed moves it to out for delivery; delivery at the partner completes it.">
  <rect width="1000" height="320" fill="#ffffff"/>
  <text x="40" y="40" font-size="22" font-weight="700" fill="#1e3a8a">One bag, four scans — the whole workflow</text>
  <text x="40" y="64" font-size="14" fill="#64748b">A customer registers a durable bag once. From then on, a scan stamps each step. No weights or payments touched in the portal — that stays in Cents.</text>

  <!-- arrow marker -->
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0,0 L7,3.2 L0,6.4 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- 4 nodes: x = 36, 282, 528, 774 ; width 190 ; y 100..210 -->
  <g>
    <!-- node 1 -->
    <rect x="36" y="100" width="190" height="112" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="66" cy="130" r="15" fill="#2563eb"/><text x="66" y="135" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="92" y="127" font-size="15" font-weight="700" fill="#1e3a8a">Pickup</text>
    <text x="92" y="145" font-size="12" fill="#64748b">at the partner</text>
    <text x="56" y="178" font-size="12" fill="#475569">Customer or operator</text>
    <text x="56" y="195" font-size="12" fill="#475569">scans to start.</text>
    <!-- node 2 -->
    <rect x="282" y="100" width="190" height="112" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="312" cy="130" r="15" fill="#2563eb"/><text x="312" y="135" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="338" y="127" font-size="15" font-weight="700" fill="#1e3a8a">Intake</text>
    <text x="338" y="145" font-size="12" fill="#64748b">at the store</text>
    <text x="302" y="178" font-size="12" fill="#475569">Operator keys the</text>
    <text x="302" y="195" font-size="12" fill="#475569">order into Cents.</text>
    <!-- node 3 -->
    <rect x="528" y="100" width="190" height="112" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="558" cy="130" r="15" fill="#2563eb"/><text x="558" y="135" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="584" y="127" font-size="15" font-weight="700" fill="#1e3a8a">Ready</text>
    <text x="584" y="145" font-size="12" fill="#64748b">at the store</text>
    <text x="548" y="178" font-size="12" fill="#475569">Operator confirms</text>
    <text x="548" y="195" font-size="12" fill="#475569">payment, releases.</text>
    <!-- node 4 -->
    <rect x="774" y="100" width="190" height="112" rx="12" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
    <circle cx="804" cy="130" r="15" fill="#16a34a"/><text x="804" y="135" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <text x="830" y="127" font-size="15" font-weight="700" fill="#15803d">Delivery</text>
    <text x="830" y="145" font-size="12" fill="#64748b">at the partner</text>
    <text x="794" y="178" font-size="12" fill="#475569">Scan completes</text>
    <text x="794" y="195" font-size="12" fill="#475569">the order.</text>
  </g>

  <!-- arrows between nodes (gaps: 226-282, 472-528, 718-774) at y=156 -->
  <line x1="230" y1="156" x2="278" y2="156" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="476" y1="156" x2="524" y2="156" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="722" y1="156" x2="770" y2="156" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>

  <!-- state badges below each node -->
  <g font-size="12" font-weight="700" text-anchor="middle">
    <rect x="71" y="236" width="120" height="26" rx="13" fill="#dbeafe"/><text x="131" y="253" fill="#1e40af">pending</text>
    <rect x="312" y="236" width="130" height="26" rx="13" fill="#dbeafe"/><text x="377" y="253" fill="#1e40af">in_progress</text>
    <rect x="545" y="236" width="156" height="26" rx="13" fill="#dbeafe"/><text x="623" y="253" fill="#1e40af">out_for_delivery</text>
    <rect x="815" y="236" width="108" height="26" rx="13" fill="#bbf7d0"/><text x="869" y="253" fill="#15803d">complete</text>
  </g>
  <text x="500" y="292" font-size="12.5" fill="#94a3b8" text-anchor="middle">Customers get an update at every step. Affiliates can be notified on start and when an order is ready.</text>
</svg>
