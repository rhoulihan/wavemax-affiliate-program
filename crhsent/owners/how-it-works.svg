<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="'Segoe UI',-apple-system,Roboto,Arial,sans-serif" role="img" aria-label="The customer scans a bag QR into your branded portal, which handles registration, scan-gate tracking, notifications and the expediter board. Money, weight and processing stay in your Cents system. The portal runs on a hardened dual-region cloud with Cloudflare, with nothing for the owner to host or maintain.">
  <rect width="940" height="430" fill="#ffffff"/>
  <text x="40" y="40" font-size="22" font-weight="700" fill="#1e3a8a">A complete portal — almost nothing to run</text>
  <text x="40" y="64" font-size="14" fill="#64748b">The portal does the customer-facing and tracking work. Your money, weight and processing stay where they already live.</text>

  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#94a3b8"/></marker>
  </defs>

  <!-- Customer -->
  <rect x="36" y="150" width="150" height="96" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="111" y="186" font-size="15" font-weight="700" fill="#334155" text-anchor="middle">Customer</text>
  <text x="111" y="208" font-size="12" fill="#64748b" text-anchor="middle">scans the bag QR</text>
  <text x="111" y="224" font-size="12" fill="#64748b" text-anchor="middle">on their phone</text>

  <line x1="190" y1="198" x2="224" y2="198" stroke="#94a3b8" stroke-width="2" marker-end="url(#a2)"/>

  <!-- Portal panel -->
  <rect x="230" y="100" width="450" height="250" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="455" y="130" font-size="16" font-weight="700" fill="#1e3a8a" text-anchor="middle">Your branded portal &#183; your domain</text>
  <!-- 2x2 pills -->
  <g>
    <rect x="252" y="150" width="200" height="84" rx="10" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="352" y="182" font-size="13.5" font-weight="700" fill="#1e3a8a" text-anchor="middle">Bag registration</text>
    <text x="352" y="202" font-size="11.5" fill="#475569" text-anchor="middle">verified email + phone</text>
    <text x="352" y="218" font-size="11.5" fill="#475569" text-anchor="middle">one durable QR per customer</text>

    <rect x="466" y="150" width="200" height="84" rx="10" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="566" y="182" font-size="13.5" font-weight="700" fill="#1e3a8a" text-anchor="middle">Scan-gate tracking</text>
    <text x="566" y="202" font-size="11.5" fill="#475569" text-anchor="middle">4 scans drive the order</text>
    <text x="566" y="218" font-size="11.5" fill="#475569" text-anchor="middle">state, hands-free</text>

    <rect x="252" y="246" width="200" height="84" rx="10" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="352" y="278" font-size="13.5" font-weight="700" fill="#1e3a8a" text-anchor="middle">Automatic notifications</text>
    <text x="352" y="298" font-size="11.5" fill="#475569" text-anchor="middle">customers + (optional)</text>
    <text x="352" y="314" font-size="11.5" fill="#475569" text-anchor="middle">affiliate partners</text>

    <rect x="466" y="246" width="200" height="84" rx="10" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="566" y="278" font-size="13.5" font-weight="700" fill="#1e3a8a" text-anchor="middle">Order Expediter board</text>
    <text x="566" y="298" font-size="11.5" fill="#475569" text-anchor="middle">live in-store display +</text>
    <text x="566" y="314" font-size="11.5" fill="#475569" text-anchor="middle">daily throughput stats</text>
  </g>

  <line x1="680" y1="198" x2="714" y2="198" stroke="#94a3b8" stroke-width="2" marker-end="url(#a2)"/>

  <!-- Cents -->
  <rect x="720" y="150" width="184" height="96" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="812" y="182" font-size="15" font-weight="700" fill="#15803d" text-anchor="middle">Cents</text>
  <text x="812" y="203" font-size="11.5" fill="#475569" text-anchor="middle">weight, payment,</text>
  <text x="812" y="219" font-size="11.5" fill="#475569" text-anchor="middle">processing — your system,</text>
  <text x="812" y="235" font-size="11.5" fill="#475569" text-anchor="middle">never touched here</text>

  <!-- footer band -->
  <rect x="36" y="372" width="868" height="44" rx="10" fill="#1e3a8a"/>
  <text x="470" y="399" font-size="13.5" font-weight="600" fill="#ffffff" text-anchor="middle">Runs on a hardened dual-region cloud behind Cloudflare CDN + WAF &#8212; nothing for you to host, patch, or maintain.</text>
</svg>
