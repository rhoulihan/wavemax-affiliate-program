<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="'Segoe UI',-apple-system,Roboto,Arial,sans-serif" role="img" aria-label="Monthly cost rises at five dollars per bag and caps at five hundred dollars once one hundred bags are processed; every bag beyond one hundred is free.">
  <rect width="760" height="460" fill="#ffffff"/>
  <text x="40" y="42" font-size="22" font-weight="700" fill="#1e3a8a">What you pay, by volume</text>
  <text x="40" y="68" font-size="14" fill="#64748b">$5 per bag processed &#183; capped at $500/mo &#183; every bag past 100 is free</text>

  <!-- plot frame: x 90..700 (610w), y 110..380 (270h). bags 0..160 -> x; $0..600 -> y -->
  <!-- y gridlines + labels ($0,100,200,300,400,500,600) -->
  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="90" y1="380" x2="700" y2="380"/>
    <line x1="90" y1="335" x2="700" y2="335"/>
    <line x1="90" y1="290" x2="700" y2="290"/>
    <line x1="90" y1="245" x2="700" y2="245"/>
    <line x1="90" y1="200" x2="700" y2="200"/>
    <line x1="90" y1="155" x2="700" y2="155"/>
    <line x1="90" y1="110" x2="700" y2="110"/>
  </g>
  <g font-size="12" fill="#94a3b8" text-anchor="end">
    <text x="80" y="384">$0</text>
    <text x="80" y="339">$100</text>
    <text x="80" y="294">$200</text>
    <text x="80" y="249">$300</text>
    <text x="80" y="204">$400</text>
    <text x="80" y="159">$500</text>
    <text x="80" y="114">$600</text>
  </g>
  <!-- axes -->
  <line x1="90" y1="110" x2="90" y2="380" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="90" y1="380" x2="700" y2="380" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- x labels: 0,40,80,120,160 bags. scale: x = 90 + bags*(610/160)=90+bags*3.8125 -->
  <g font-size="12" fill="#94a3b8" text-anchor="middle">
    <text x="90" y="400">0</text>
    <text x="242" y="400">40</text>
    <text x="395" y="400">80</text>
    <text x="547" y="400">120</text>
    <text x="700" y="400">160</text>
  </g>
  <text x="395" y="426" font-size="13" fill="#64748b" text-anchor="middle" font-weight="600">Bags processed per month</text>

  <!-- $500 cap reference line (y for $500 = 155) -->
  <line x1="90" y1="155" x2="700" y2="155" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="694" y="148" font-size="12" fill="#16a34a" text-anchor="end" font-weight="700">$500 cap</text>

  <!-- cost curve: $5/bag 0->100 bags (x 90->471, y 380->155), then flat $500 (y155) to 160 bags (x700) -->
  <!-- area under curve -->
  <path d="M90,380 L471,155 L700,155 L700,380 Z" fill="#2563eb" opacity="0.08"/>
  <polyline points="90,380 471,155 700,155" fill="none" stroke="#2563eb" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- knee marker at 100 bags / $500 -->
  <circle cx="471" cy="155" r="6" fill="#16a34a" stroke="#ffffff" stroke-width="2"/>
  <line x1="471" y1="155" x2="471" y2="380" stroke="#16a34a" stroke-width="1" stroke-dasharray="3 4" opacity="0.6"/>
  <text x="471" y="400" font-size="12" fill="#16a34a" text-anchor="middle" font-weight="700">100</text>

  <!-- callouts -->
  <g>
    <rect x="150" y="300" width="150" height="52" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="225" y="322" font-size="13" font-weight="700" fill="#1e3a8a" text-anchor="middle">$5 / bag</text>
    <text x="225" y="340" font-size="11.5" fill="#475569" text-anchor="middle">low volume pays little</text>
  </g>
  <g>
    <rect x="505" y="186" width="175" height="52" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="592" y="208" font-size="13" font-weight="700" fill="#15803d" text-anchor="middle">Free past 100 bags</text>
    <text x="592" y="226" font-size="11.5" fill="#475569" text-anchor="middle">cost never exceeds $500</text>
  </g>
</svg>
