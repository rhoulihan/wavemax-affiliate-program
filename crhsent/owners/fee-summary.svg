<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 396" font-family="'Segoe UI',-apple-system,Roboto,Arial,sans-serif" role="img" aria-label="A monthly partner statement: each partner's bags, delivery fees, and negotiated commission roll up to an amount owed, with a total ready to hand to payables.">
  <rect width="760" height="396" fill="#ffffff"/>
  <text x="40" y="40" font-size="20" font-weight="700" fill="#1e3a8a">Monthly partner statement</text>
  <text x="40" y="62" font-size="13" fill="#64748b">Every fee and commission tracked automatically &#8212; one summary to hand to payables.</text>

  <!-- table -->
  <g>
    <!-- header row -->
    <rect x="40" y="84" width="680" height="38" rx="8" fill="#1e3a8a"/>
    <text x="58" y="108" font-size="13" font-weight="700" fill="#fff">Partner</text>
    <text x="360" y="108" font-size="13" font-weight="700" fill="#cfe0ff" text-anchor="end">Bags</text>
    <text x="500" y="108" font-size="13" font-weight="700" fill="#cfe0ff" text-anchor="end">Delivery fees</text>
    <text x="620" y="108" font-size="13" font-weight="700" fill="#cfe0ff" text-anchor="end">Commission</text>
    <text x="704" y="108" font-size="13" font-weight="700" fill="#fff" text-anchor="end">Owed</text>

    <!-- rows -->
    <g font-size="13.5" fill="#334155">
      <text x="58" y="150">Soapbox Laundry Co</text><text x="360" y="150" text-anchor="end">64</text><text x="500" y="150" text-anchor="end">$320</text><text x="620" y="150" text-anchor="end">$96</text><text x="704" y="150" text-anchor="end" font-weight="700" fill="#0f172a">$416</text>
      <line x1="40" y1="166" x2="720" y2="166" stroke="#eef2f7"/>
      <text x="58" y="192">North Loop Wash</text><text x="360" y="192" text-anchor="end">41</text><text x="500" y="192" text-anchor="end">$246</text><text x="620" y="192" text-anchor="end">$74</text><text x="704" y="192" text-anchor="end" font-weight="700" fill="#0f172a">$320</text>
      <line x1="40" y1="208" x2="720" y2="208" stroke="#eef2f7"/>
      <text x="58" y="234">Fresh Fold Express</text><text x="360" y="234" text-anchor="end">28</text><text x="500" y="234" text-anchor="end">$84</text><text x="620" y="234" text-anchor="end" fill="#94a3b8">&#8212;</text><text x="704" y="234" text-anchor="end" font-weight="700" fill="#0f172a">$84</text>
      <line x1="40" y1="250" x2="720" y2="250" stroke="#eef2f7"/>
      <text x="58" y="276">Riverside Cleaners</text><text x="360" y="276" text-anchor="end">19</text><text x="500" y="276" text-anchor="end">$57</text><text x="620" y="276" text-anchor="end" fill="#94a3b8">&#8212;</text><text x="704" y="276" text-anchor="end" font-weight="700" fill="#0f172a">$57</text>
    </g>

    <!-- total row -->
    <rect x="40" y="296" width="680" height="42" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="58" y="323" font-size="14" font-weight="800" fill="#15803d">Total to pay out</text>
    <text x="360" y="323" font-size="14" font-weight="700" fill="#15803d" text-anchor="end">152</text>
    <text x="500" y="323" font-size="14" font-weight="700" fill="#15803d" text-anchor="end">$707</text>
    <text x="620" y="323" font-size="14" font-weight="700" fill="#15803d" text-anchor="end">$170</text>
    <text x="704" y="323" font-size="15" font-weight="800" fill="#15803d" text-anchor="end">$877</text>
  </g>

  <text x="40" y="372" font-size="12" fill="#94a3b8">Illustrative figures. You set each partner's fees and commission; the portal does the running math.</text>
</svg>
