<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>CRHS Enterprises, LLC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    min-height: 100vh;
  }
  .card {
    max-width: 560px;
    width: 100%;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 2.5rem;
    text-align: center;
  }
  .logo {
    font-size: 0.875rem;
    letter-spacing: 0.25em;
    color: #94a3b8;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
  }
  h1 {
    font-size: 1.875rem;
    font-weight: 600;
    color: #f8fafc;
    margin-bottom: 1rem;
  }
  p {
    color: #cbd5e1;
    line-height: 1.6;
    margin-bottom: 1rem;
  }
  .contact {
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #334155;
    font-size: 0.875rem;
    color: #94a3b8;
  }
  a {
    color: #60a5fa;
    text-decoration: none;
  }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <main class="card">
    <div class="logo">CRHS Enterprises</div>
    <h1>CRHS Enterprises, LLC</h1>
    <p>A Texas holding company. This domain is reserved for internal infrastructure and administrative use.</p>
    <div class="contact">
      For inquiries: <a href="mailto:admin@crhsent.com">admin@crhsent.com</a>
    </div>
  </main>
</body>
</html>
