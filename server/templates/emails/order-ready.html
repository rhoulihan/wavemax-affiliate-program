<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  .header {
    background-color: #1e3a8a;
    color: #ffffff !important;
    padding: 20px;
    text-align: center;
  }
  .logo {
    max-width: 180px;
    margin-bottom: 12px;
  }
  .footer {
    background-color: #f5f5f5;
    padding: 20px;
    text-align: center;
    font-size: 12px;
    color: #6b7280;
  }
</style>
</head>
<body style="margin:0;padding:0;background:#f4f4f4;">
  <div style="font-family: Arial, sans-serif; max-width:600px; margin:0 auto; background:#ffffff;">
    <div class="header" style="background-color:#1e3a8a;color:#ffffff;padding:20px;text-align:center;">
      <img src="[BASE_URL]/assets/images/brand/logo-wavemax.png" alt="WaveMAX Laundry" class="logo" style="max-width:180px;margin-bottom:12px;">
      <h2 style="margin:0;">Order Ready — Collect from Store</h2>
    </div>
    <div style="padding:20px;color:#333333;line-height:1.6;">
      <p>Hello [AFFILIATE_NAME],</p><p>Order <strong>[ORDER_ID]</strong> for [CUSTOMER_NAME] ([TOTAL_WEIGHT] lbs) is processed and paid. Please collect it from the store and deliver it to your customer.</p>
    </div>
    <div class="footer" style="background-color:#f5f5f5;padding:20px;text-align:center;font-size:12px;color:#6b7280;">
      &copy; 2025 CRHS Enterprises, LLC. All rights reserved.
    </div>
  </div>
</body>
</html>
