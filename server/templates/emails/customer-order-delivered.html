<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[EMAIL_TITLE]</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #1e3a8a; color: #ffffff !important; padding: 20px; text-align: center; border-radius: 5px 5px 0 0; }
        .logo { max-width: 180px; margin-bottom: 12px; }
        .content { background-color: #f9f9f9; padding: 20px; border: 1px solid #ddd; }
        .delivery-details { background-color: #e8f5e9; padding: 15px; margin: 15px 0; border-radius: 5px; border: 1px solid #4caf50; }
        .footer { background-color: #f5f5f5; padding: 20px; text-align: center; font-size: 12px; color: #6b7280; }
        .detail-row { margin: 10px 0; }
        .detail-label { font-weight: bold; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="[BASE_URL]/assets/images/brand/logo-wavemax.png" alt="WaveMAX Laundry" class="logo">
            <h1>[EMAIL_HEADER]</h1>
        </div>
        <div class="content">
            <p>[GREETING]</p>
            <p>[DELIVERED_MESSAGE]</p>
            <div class="delivery-details">
                <div class="detail-row">
                    <span class="detail-label">[ORDER_ID_LABEL]:</span> [ORDER_ID]
                </div>
                <div class="detail-row">
                    <span class="detail-label">[DELIVERED_AT_LABEL]:</span> [DELIVERED_AT]
                </div>
                <div class="detail-row">
                    <span class="detail-label">[DELIVERED_BY_LABEL]:</span> [AFFILIATE_NAME]
                </div>
            </div>
            <p>[THANKS_MESSAGE]</p>
            <p>[CLOSING_MESSAGE]</p>
        </div>
        <div class="footer">
            <p>&copy; [CURRENT_YEAR] CRHS Enterprises, LLC. [FOOTER_RIGHTS]</p>
            <p>[FOOTER_AUTOMATED_MESSAGE]</p>
        </div>
    </div>
</body>
</html>
