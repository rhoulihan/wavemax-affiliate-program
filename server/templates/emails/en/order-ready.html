<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Ready — Collect from Store</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333333; margin: 0; padding: 0; background: #f4f4f4; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { background-color: #1e3a8a; color: #ffffff !important; padding: 20px; text-align: center; }
    .logo { max-width: 180px; margin-bottom: 12px; }
    .content { padding: 20px; background-color: #ffffff; }
    .footer { background-color: #f5f5f5; padding: 20px; text-align: center; font-size: 12px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="[BASE_URL]/assets/images/brand/logo-wavemax.png" alt="WaveMAX Laundry" class="logo">
      <h1>Order Ready — Collect from Store</h1>
    </div>
    <div class="content">
      <p>Hello [AFFILIATE_NAME],</p>
      <p>Order <strong>[ORDER_ID]</strong> for [CUSTOMER_NAME] ([TOTAL_WEIGHT] lbs) is processed and paid. Please collect it from the store and deliver it to your customer.</p>
    </div>
    <div class="footer">
      <p>&copy; 2025 CRHS Enterprises, LLC. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
