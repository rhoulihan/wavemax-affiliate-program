<!DOCTYPE html>
<html>
<head>

  <title>[EMAIL_TITLE]</title>

    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; }

    .header { background-color: #1e3a8a; color: #ffffff !important; padding: 20px; text-align: center; }
    .logo { max-width: 180px; margin-bottom: 10px; }
    .content { padding: 20px; background-color: #ffffff; }
    .cta { text-align: center; margin: 28px 0; }

      padding: 14px 28px; text-decoration: none !important; border-radius: 6px; font-weight: bold; font-size: 16px; }
    a.button, a.button:link, a.button:visited, a.button:hover, a.button:active { color: #ffffff !important; text-decoration: none !important; }
    .footer { background-color: #f5f5f5; padding: 20px; text-align: center; font-size: 12px; color: #666; }
  </style>
</head>

  <div class="container">
    <div class="header">
      <img src="[BASE_URL]/assets/images/brand/logo-wavemax.png" alt="WaveMAX Laundry" class="logo">
      <h1>[EMAIL_HEADER]</h1>
    </div>
    <div class="content">
      <h2>[GREETING]</h2>
      <p>[CONFIRM_EMAIL_MESSAGE]</p>
      <div class="cta">
        <a href="[VERIFY_URL]" class="button">[CONFIRM_EMAIL_BUTTON]</a>

    </div>
    <div class="footer">
      <p>[FOOTER_SUPPORT]</p>
      <p>&copy; [CURRENT_YEAR] CRHS Enterprises, LLC. [FOOTER_RIGHTS]</p>
    </div>
