<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csp-nonce" content="">
    <meta name="description" content="WaveMAX laundry pickup and delivery — claim your laundry bag, track your order, and manage your account.">
    <title>WaveMAX Affiliate Program</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

    <!-- Bootstrap CSS — async (not layout-critical for the initial shell; each page
         brings its own critical CSS). Loaded via media="print" + css-async.js swap
         (CSP-safe, no inline onload). Removes ~34 KB / ~1.2 s of mobile render-blocking. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" media="print" data-async-css>

    <!-- Font Awesome — async (same rationale; ~19 KB / ~1 s of render-blocking removed) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" data-async-css>

    <!-- Swirl Spinner CSS — async (only needed for async-work spinners) -->
    <link rel="stylesheet" href="/assets/css/swirl-spinner.css" media="print" data-async-css>

    <!-- Async-CSS swapper (flips data-async-css links to media="all" on DOMContentLoaded) -->
    <script src="/assets/js/css-async.js?v=20260616" defer></script>

    <!-- Mobile Utils -->
    <script src="/assets/js/mobile-utils.js" defer></script>
    
    <!-- Embed App V2 Styles -->
    <link rel="stylesheet" href="/assets/css/embed-app-v2.css">
    
    <!-- Mobile Embed Styles -->
    <link rel="stylesheet" href="/assets/css/mobile-embed.css">
    
    <!-- Store CSP nonce for JavaScript access -->
    <script>window.CSP_NONCE = document.querySelector('meta[name="csp-nonce"]')?.getAttribute('content') || '';</script>
</head>
<body>
    <div id="app-container">
        <div class="loading">
            <i class="fas fa-spinner fa-spin me-2"></i>
            Loading...
        </div>
    </div>

    <!-- Bootstrap JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>

    <!-- Session Manager -->
    <script src="/assets/js/session-manager.js?v=20260619" defer></script>

    <!-- Embed App V2 Script (minified — source is embed-app-v2.js; npm run build:assets) -->
    <script src="/assets/js/embed-app-v2.min.js?v=20260621b" defer></script>
</body>
</html>
