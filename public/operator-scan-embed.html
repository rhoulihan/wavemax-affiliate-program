<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="csp-nonce" content="">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Operator Scanner - WaveMAX</title>
    <link rel="manifest" href="/manifest-scan.json">
    <link rel="icon" href="data:,">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/wavemax-embed.css">
    <link rel="stylesheet" href="/assets/css/operator-scan.css?v=20260622b">
    <link rel="stylesheet" href="/assets/css/operator-scan-embed.css">
    <link rel="stylesheet" href="/assets/css/language-switcher.css">
    <link href="/assets/css/theme.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/modal-utils.css">
    <link rel="stylesheet" href="/assets/css/swirl-spinner.css">
</head>
<body>
    <div class="main-container">
        <div class="embed-brand-header">
          <img class="embed-brand-logo" src="/assets/images/brand/logo-wavemax.png" alt="WaveMAX Laundry">
        </div>
        <div class="top-spacer"></div>

        <!-- Scan Prompt -->
        <div class="scan-prompt">
            <div class="scan-icon">🧺</div>
            <h2 data-i18n="operator.scan.heading">Scan a bag</h2>
            <p data-i18n="operator.scan.subheading">Each scan moves the bag to its next step automatically.</p>

            <!-- Hidden input for scanner (keyboard-wedge). autocorrect/autocapitalize/
                 spellcheck OFF so Android's text-assist doesn't mangle the composed
                 hex token; inputmode=none keeps the soft keyboard hidden. -->
            <input type="text" id="scanInput" autocomplete="off" autocorrect="off"
                   autocapitalize="off" spellcheck="false" inputmode="none">

            <!-- State-driven explanation (replaces the old fixed 3-stage legend) -->
            <div class="scan-types">
                <div class="scan-type">
                    <div class="scan-type-text" data-i18n="operator.scan.legend.intake">
                        New bag → check it in at the store.
                    </div>
                </div>
                <div class="scan-type">
                    <div class="scan-type-text" data-i18n="operator.scan.legend.outForDelivery">
                        Checked-in bag → hand back for delivery (confirm payment).
                    </div>
                </div>
                <div class="scan-type">
                    <div class="scan-type-text" data-i18n="operator.scan.legend.complete">
                        Out-for-delivery bag → mark delivered.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scan confirm dialog (one dialog for every state-driven transition) -->
    <div class="confirmation-modal" id="scanConfirmModal" hidden>
        <div class="confirmation-content">
            <h4 id="scanConfirmPrompt"></h4>
            <p id="scanConfirmCustomer"></p>
            <div id="scanCustomerDetails" class="scan-customer-details">
                <p id="scanConfirmPhone"></p>
                <p id="scanConfirmEmail" hidden></p>
                <p id="scanConfirmAddress" hidden></p>
            </div>
            <span id="scanOrderStatus" class="scan-order-status" hidden></span>
            <!-- Order add-ons + special instructions — shown only at intake (a
                 pending bag); built by operator-scan-init.js, hidden on scan-out. -->
            <div id="scanAddOns" class="scan-addons" hidden></div>
            <div id="scanInstructions" class="scan-instructions" hidden></div>
            <!-- Delivery fee WITH price — shown at intake so the operator picks the
                 right fee in Cents (it varies by partner). Built by the init JS. -->
            <div id="scanDeliveryFee" class="scan-delivery-fee" hidden></div>
            <p id="scanCentsWarning" class="scan-cents-warning" hidden></p>
            <!-- Final order total — required at the out-for-delivery (send-out) scan
                 so we can track revenue by partner. -->
            <div class="scan-order-total-row" id="scanOrderTotalRow" hidden>
                <label for="scanOrderTotal" data-i18n="operator.scan.orderTotalLabel">Final order total ($)</label>
                <input type="number" id="scanOrderTotal" min="0" step="0.01" inputmode="decimal">
            </div>
            <label class="scan-confirm-payment" id="scanPaymentRow" hidden>
                <input type="checkbox" id="scanPaymentConfirmed">
                <span data-i18n="operator.scan.paymentConfirmed">Payment received in Cents and receipt attached to the bag</span>
            </label>
            <div class="action-buttons">
                <button type="button" class="btn btn-secondary" id="scanConfirmNo"
                        data-i18n="operator.scan.cancel">Cancel</button>
                <button type="button" class="btn btn-primary" id="scanConfirmYes"
                        data-i18n="operator.scan.confirm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Transient toast (success / error) -->
    <div class="confirmation-modal" id="confirmationModal">
        <div class="confirmation-content">
            <div class="confirmation-icon" id="confirmIcon">✓</div>
            <div class="confirmation-text">
                <h4 id="confirmTitle">Success</h4>
                <p id="confirmMessage">Bag scanned successfully</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/assets/js/i18n.js"></script>
    <script src="/assets/js/language-switcher.js"></script>
    <script src="/assets/js/modal-utils.js"></script>
    <script src="/assets/js/errorHandler.js"></script>
    <script src="/assets/js/csrf-utils.js"></script>
    <script src="/assets/js/api-client.js"></script>
    <script src="/assets/js/bag-token-parser.js"></script>
    <script src="/assets/js/scan-session.js"></script>
    <script src="/assets/js/operator-scan-init.js"></script>
</body>
</html>
