<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Coming Soon</title>
  <link rel="stylesheet" href="/assets/css/wavemax-theme.css?v=20260504c">
  <link rel="stylesheet" href="/assets/css/wavemax-components.css?v=20260504c">
  <style>
    body { margin: 0; padding: 0; background: var(--wm-bg-soft); font-family: var(--wm-font-body); }
    .wm-coming-soon {
      min-height: 60vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 4rem 1.5rem;
    }
    .wm-coming-soon h1 {
      font-family: var(--wm-font-heading);
      font-weight: 700;
      font-size: clamp(1.6rem, 3.4vw, 2.4rem);
      color: var(--wm-text);
      margin: 0 0 1rem;
    }
    .wm-coming-soon p {
      color: var(--wm-text-soft);
      max-width: 52ch;
      line-height: 1.6;
      font-size: 1.05rem;
    }
    .wm-coming-soon .badge {
      display: inline-block;
      background: var(--wm-secondary);
      color: #fff;
      padding: 4px 12px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="wm-coming-soon">
    <span class="badge">Coming Soon</span>
    <h1>This page hasn't been published yet</h1>
    <p>The franchise has reserved this nav link but hasn't registered content for it. Check back soon — or use the navigation above to explore the rest of the site.</p>
  </div>
  <script src="/assets/js/iframe-bridge-v2.js?v=20260504c"></script>
  <script>
    if (window.IframeBridge) {
      window.IframeBridge.init({ pageIdentifier: 'coming-soon', enableAutoResize: true });
    }
  </script>
</body>
</html>
